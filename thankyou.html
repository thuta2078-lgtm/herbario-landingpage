<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cảm ơn</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:linear-gradient(135deg,#3f2b20,#4c6b45);

      padding:20px;
    }

    .thank-box{
      background:white;
      padding:60px;
      border-radius:35px;
      text-align:center;
      max-width:600px;
    }

    h1{
      color:#4c6b45;
      margin-bottom:20px;
      font-size:42px;
    }

    p{
      line-height:1.7;
      margin-bottom:30px;
    }

    a{
      display:inline-block;
      background:#4c6b45;
      color:white;
      padding:15px 28px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
    }

  </style>

</head>

<body>

  <div class="thank-box">

    <h1>
      🎉 Đặt Hàng Thành Công
    </h1>

    <p>
      Cảm ơn bạn đã tin tưởng HERBARIO.
      Chúng tôi sẽ liên hệ xác nhận đơn hàng sớm nhất.
    </p>

    <a href="index.html">
      Quay lại trang chủ
    </a>

  </div>

</body>

</html>
